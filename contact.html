<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - At 66</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Jost:wght@300;400;500&display=swap');
        body { font-family: 'Jost', sans-serif; background-color: #0a0a0a; color: #f5f5f5; }
        h1, h2, h3, .serif { font-family: 'Cinzel', serif; }
    </style>

    <style>
        body { opacity: 0; transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1); transform: scale(0.97); }
        body.loaded { opacity: 1; transform: scale(1); }
        body.exiting { opacity: 0; transform: scale(1.03); transition: opacity 0.4s ease-in, transform 0.4s ease-in; }
    </style>
</head>
<body class="antialiased">
    <nav class="w-full py-8 px-8 md:px-16 flex justify-between items-center text-white border-b border-white/10">
        <a href="index.html" class="text-2xl font-medium serif tracking-[0.15em]">AT 66</a>
        <div class="hidden md:flex space-x-12 text-xs uppercase tracking-[0.2em]">
            <a href="services.html" class="hover:text-rose-300 transition duration-300">Services</a>
            <a href="stylists.html" class="hover:text-rose-300 transition duration-300">Stylists</a>
            <a href="contact.html" class="text-rose-300 transition duration-300">Contact</a>
        </div>
    </nav>
    <main class="py-24 px-8 md:px-16 max-w-4xl mx-auto text-center">
        <h1 class="serif text-5xl mb-12 text-rose-100">Contact & Booking</h1>
        <p class="font-light text-gray-400 mb-16">Booking form and location details map go here.</p>
        <a href="index.html" class="border border-white/50 px-6 py-3 text-xs uppercase tracking-widest hover:bg-white hover:text-black transition duration-500">Back Home</a>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requestAnimationFrame(() => {
                setTimeout(() => document.body.classList.add('loaded'), 50);
            });
            document.querySelectorAll('a[href".html"]').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    const target = link.getAttribute('href');
                    document.body.classList.remove('loaded');
                    document.body.classList.add('exiting');
                    setTimeout(() => window.location.href = target, 400);
                });
            });
        });
    </script>
</body>
</html>
